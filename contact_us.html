<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="edit.css">
         <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
    </head>
<body>
  <header>
    <h1>Contact Us</h1>
    <p>We’d love to hear from you!</p>
  </header>

  <section class="contact">
    <div class="info">
      <h2>📍 Our Location</h2>
      <p>123 Sweet Street, Kanke, Jharkhand</p>

      <h2>📞 Phone</h2>
      <p><a href="tel:+919876543210">+91 98765‑43210</a></p>

      <h2>📧 Email</h2>
      <p><a href="mailto:hello@meltedshop.com">hello@meltedshop.com</a></p>

      <h2>🕒 Hours</h2>
      <p>Mon–Sat: 10 AM – 9 PM<br>Sunday: 12 PM – 6 PM</p>
    </div>

    <div class="form">
      <h2>Send Us a Message</h2>
      <form>
        <label for="name">Name</label>
        <input type="text" id="name" placeholder="Your Name" required>

        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Your Email" required>

        <label for="subject">Subject</label>
        <input type="text" id="subject" placeholder="Message Subject">

        <label for="message">Message</label>
        <textarea id="message" rows="5" placeholder="Write your message here..." required></textarea>

        <button type="submit">Send Message</button>
      </form>
    </div>
  </section>

  <footer>
    <p>© 2026 Melted Shop | Sweetness Served Daily</p>
  </footer>
</body>
</html>
